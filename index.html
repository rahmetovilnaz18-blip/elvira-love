<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>...</title>

  <style>
    :root{
      --bg:#070710;
      --card:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.10);
      --txt:#f4f4ff;
      --muted:rgba(244,244,255,.72);
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --r:26px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      height:100%;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:
        radial-gradient(900px 500px at 20% 0%, rgba(122,92,255,.20), transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(255,77,125,.15), transparent 60%),
        var(--bg);
      color:var(--txt);
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:min(700px,100%);
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      padding:32px 24px;
      text-align:center;
    }

    h1{
      font-size:32px;
      margin-bottom:18px;
      line-height:1.3;
    }

    .timer{
      font-size:22px;
      font-weight:700;
      color:var(--muted);
      margin-top:12px;
    }

    .label{
      margin-top:10px;
      font-size:14px;
      color:rgba(244,244,255,.5);
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Время идёт, а мысли пока не становятся тише.</h1>
  <div class="timer" id="timer">...</div>
  <div class="label">с 23.03.2026 19:00</div>
</div>

<script>
  const startDate = new Date("2026-03-23T19:00:00");

  function updateTimer(){
    const now = new Date();
    const diff = now - startDate;

    const totalSec = Math.floor(diff / 1000);

    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;

    document.getElementById("timer").textContent =
      `${days}д ${hours}ч ${mins}м ${secs}с`;
  }

  updateTimer();
  setInterval(updateTimer, 1000);
</script>

</body>
</html>
